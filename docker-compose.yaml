services:
  p1-postgres:
    image: postgres:15
    container_name: p1-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - p1-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - p1-net

  p1meter-v2:
    build: .
    container_name: p1meter-v2
    ports:
      - "4999:4999"
    env_file: .env
    environment:
      P1_IP: ${P1_IP}
      DATABASE_URL: ${DATABASE_URL}
      SOLAREDGE_SITE_ID: ${SOLAREDGE_SITE_ID}
      SOLAREDGE_API_KEY: ${SOLAREDGE_API_KEY}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Europe/Amsterdam
    depends_on:
      p1-postgres:
        condition: service_healthy
    networks:
      - p1-net

networks:
  p1-net:
    driver: bridge

volumes:
  p1-data:
